name: aion_perfume_app
description: AION 향수 모바일 앱
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0 

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # HTTP & Network

  http: ^1.2.1

  http_parser: ^4.0.2   # multipart 이미지 업로드 (기존 dart 파일에서 사용)
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # State Management & Storage
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  
  # JSON & Serialization
  json_annotation: ^4.8.1
  
  # Image & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # WebView (다음 우편번호 검색)
  webview_flutter: ^4.7.0

  # Share (향수 상세 페이지 공유 버튼)
  share_plus: ^7.2.2
  
  # Utilities
  intl: ^0.19.0
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env  

  # 폰트 (필요시 추가)
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: fonts/Pretendard-Regular.ttf
  #       - asset: fonts/Pretendard-Bold.ttf
  #         weight: 700