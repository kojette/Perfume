# ─────────────────────────────────────────────────────────
# Claude 모델 설정
# ─────────────────────────────────────────────────────────
# 기본 모델: Sonnet 4.6 (창작 품질 우선)
# 테스트 시 Haiku 사용하려면 아래 줄을 claude-haiku-4-5 로 바꾸기
#   - Sonnet 4.6: claude-sonnet-4-6   ($3/$15 per 1M tokens)
#   - Haiku  4.5: claude-haiku-4-5    ($1/$5  per 1M tokens, 약 1/3 비용)
#   - Opus   4.7: claude-opus-4-7     ($5/$25 per 1M tokens, 플래그십)
claude.model=claude-haiku-4-5 
# claude-sonnet-4-6

# Sonnet 호출 실패 시 자동 fallback 모델 (시연 안정성용)
claude.fallback-model=claude-haiku-4-5

# 한국어 응답 약 1500자(대화체 + recipe JSON) 출력에 충분
# 잘림 발생 시 1800~2000으로 상향
claude.max-tokens=1600