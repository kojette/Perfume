spring.application.name=back

spring.config.import=optional:classpath:application-secret.properties

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jackson.serialization.fail-on-empty-beans=false

supabase.jwt.x=fZ1IlHgqCDbA-MUnN3zKKdNzZogXHfntfgWdtQM0ySA
supabase.jwt.y=TkS_LWQq7Up2RZ3ltyKwhMBUrPbFg7Ofh1FfqLrUvVQ

spring.jackson.serialization.write-dates-as-timestamps=false

spring.datasource.url=jdbc:postgresql://your-db-url:5432/dbname?prepareThreshold=0

spring.datasource.hikari.connection-init-sql=SET SESSION CHARACTERISTICS AS TRANSACTION ISOLATION LEVEL READ COMMITTED
spring.datasource.hikari.auto-commit=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

#?? ??? ??
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.initialization-fail-timeout=0

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


spring.mvc.async.request-timeout=120000

server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
server.servlet.context-path=/api

gemini.api.key=${GEMINI_API_KEY:}
claude.api.key=${CLAUDE_API_KEY:}

