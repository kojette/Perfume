spring.application.name=back

spring.config.import=optional:classpath:application-secret.properties

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jackson.serialization.fail-on-empty-beans=false

supabase.jwt.x=fZ1IlHgqCDbA-MUnN3zKKdNzZogXHfntfgWdtQM0ySA
supabase.jwt.y=TkS_LWQq7Up2RZ3ltyKwhMBUrPbFg7Ofh1FfqLrUvVQ


spring.jackson.serialization.write-dates-as-timestamps=false 

# Prepared Statement 캐싱 기능을 비활성화합니다.
spring.datasource.url=jdbc:postgresql://your-db-url:5432/dbname?prepareThreshold=0

# HikariCP - prepared statement 충돌 방지
spring.datasource.hikari.connection-init-sql=SET SESSION CHARACTERISTICS AS TRANSACTION ISOLATION LEVEL READ COMMITTED
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false


